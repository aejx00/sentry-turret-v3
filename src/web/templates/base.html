<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sentry Turret V3{% endblock %}</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: #333;
      --accent: #00e676;
      --danger: #f44336;
      --warn: #ffb300;
      --text: #e0e0e0;
      --muted: #777;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    header h1 { font-size: 1.1rem; color: var(--accent); letter-spacing: 2px; }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 4px 10px;
      border: 1px solid transparent;
      border-radius: 3px;
      transition: all 0.15s;
    }
    nav a:hover, nav a.active { color: var(--accent); border-color: var(--accent); }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    button {
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--text);
      padding: 8px 16px;
      font-family: inherit;
      font-size: 0.85rem;
      transition: all 0.15s;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    button.danger { border-color: var(--danger); color: var(--danger); }
    button.danger:hover { background: var(--danger); color: #fff; }
    button.primary { border-color: var(--accent); color: var(--accent); }
    button.primary:hover { background: var(--accent); color: #000; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: bold;
    }
    .badge-armed { background: var(--danger); color: #fff; }
    .badge-safe  { background: var(--accent); color: #000; }
    .badge-mode  { background: var(--surface); border: 1px solid var(--accent); color: var(--accent); }
    label { font-size: 0.8rem; color: var(--muted); }
    input, select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 3px;
      font-family: inherit;
    }
    #status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 6px 16px;
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      gap: 20px;
    }
  </style>
</head>
<body>
<header>
  <h1>&#9889; SENTRY TURRET V3</h1>
  <nav>
    <a href="/" {% if request.url.path == '/' %}class="active"{% endif %}>Ops</a>
    <a href="/register" {% if request.url.path == '/register' %}class="active"{% endif %}>Register</a>
  </nav>
  <div style="margin-left:auto">
    <button id="mute-btn" onclick="toggleMute()" style="font-size:0.8rem;padding:5px 12px">
      &#128266; Sound ON
    </button>
  </div>
</header>
<div class="container">
  {% block content %}{% endblock %}
</div>
<div id="status-bar">
  <span id="sb-mode">MODE: —</span>
  <span id="sb-armed">SAFETY: —</span>
  <span id="sb-ammo">AMMO: —</span>
  <span id="sb-pan">PAN: —</span>
  <span id="sb-tilt">TILT: —</span>
  <span id="sb-target">TARGET: —</span>
  <span id="sb-cooldown" style="color:var(--warn)"></span>
  <span id="sb-muted" style="margin-left:auto"></span>
</div>
<script>
  function poll() {
    fetch('/api/status').then(r => r.json()).then(d => {
      document.getElementById('sb-mode').textContent   = 'MODE: ' + d.mode.toUpperCase();
      document.getElementById('sb-armed').textContent  = 'SAFETY: ' + (d.armed ? 'ARMED' : 'SAFE');
      document.getElementById('sb-ammo').textContent   = 'AMMO: ' + d.ammo;
      document.getElementById('sb-pan').textContent    = 'PAN: ' + d.pan;
      document.getElementById('sb-tilt').textContent   = 'TILT: ' + d.tilt;
      document.getElementById('sb-target').textContent = 'TARGET: ' + (d.target || 'none');
      const cd = d.cooldown_remaining || 0;
      document.getElementById('sb-cooldown').textContent = cd > 0 ? 'COOLDOWN: ' + cd.toFixed(1) + 's' : '';
      _updateMuteUI(d.muted);
      if (typeof onStatusUpdate === 'function') onStatusUpdate(d);
    }).catch(() => {});
  }

  function _updateMuteUI(muted) {
    const btn = document.getElementById('mute-btn');
    const sb  = document.getElementById('sb-muted');
    if (muted) {
      btn.textContent = '🔇 Muted';
      btn.style.borderColor = 'var(--warn)';
      btn.style.color = 'var(--warn)';
      sb.textContent = 'MUTED';
    } else {
      btn.textContent = '🔊 Sound ON';
      btn.style.borderColor = '';
      btn.style.color = '';
      sb.textContent = '';
    }
  }

  function toggleMute() {
    fetch('/api/mute/toggle', {method: 'POST'})
      .then(r => r.json())
      .then(d => _updateMuteUI(d.muted));
  }

  setInterval(poll, 800);
  poll();
</script>
</body>
</html>
